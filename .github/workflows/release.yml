name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bun_target: bun-linux-x64
            artifact: shiploadcli-linux-x64
          - os: ubuntu-latest
            bun_target: bun-linux-arm64
            artifact: shiploadcli-linux-arm64
          - os: macos-latest
            bun_target: bun-darwin-x64
            artifact: shiploadcli-mac-x64
          - os: macos-latest
            bun_target: bun-darwin-arm64
            artifact: shiploadcli-mac-arm64
          - os: ubuntu-latest
            bun_target: bun-windows-x64
            artifact: shiploadcli-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=${{ matrix.bun_target }} --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum shiploadcli-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/shiploadcli-*
            artifacts/SHA256SUMS
