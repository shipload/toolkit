name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint + type-check
        run: make check
      - name: Test
        run: make test
      - name: Build
        run: make build
