name: CI

on:
  pull_request:
  push:
    branches: [dev, master]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned: bun 1.3.13 has a transpiler regression that mis-generates
          # `_init` for `class init` + decorator combos in @wharfkit/cli output.
          # Track in backlog/upstream; bump when a working version ships.
          bun-version: 1.3.8
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint + type-check
        run: make check
      - name: Test
        run: make test
      - name: Build
        run: make build
